<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200" fill="none">
  <!-- Curved stem: starts bottom-center, curves up-right like Krishna's crown feather (mor-pankh) -->
  <path d="M 55 195 Q 50 150 55 110 Q 62 80 75 55 Q 84 40 80 25"
        stroke="#2d6a4f" stroke-width="1.2" stroke-linecap="round" opacity="0.75"/>

  <!-- Wispy barbs flowing along the curved stem (outer/right side) -->
  <g stroke="#3a7a5f" stroke-width="0.8" opacity="0.55" stroke-linecap="round" fill="none">
    <path d="M 55 180 Q 70 178 82 182"/>
    <path d="M 54 165 Q 72 162 86 166"/>
    <path d="M 53 150 Q 73 146 88 148"/>
    <path d="M 54 135 Q 74 130 90 130"/>
    <path d="M 56 120 Q 76 112 92 112"/>
    <path d="M 60 105 Q 78 96 94 94"/>
    <path d="M 65 90 Q 82 80 96 76"/>
    <path d="M 70 75 Q 86 64 98 58"/>
  </g>

  <!-- Wispy barbs (inner/left side) -->
  <g stroke="#3a7a5f" stroke-width="0.8" opacity="0.5" stroke-linecap="round" fill="none">
    <path d="M 55 180 Q 42 178 30 184"/>
    <path d="M 54 165 Q 38 162 24 168"/>
    <path d="M 53 150 Q 35 146 20 150"/>
    <path d="M 54 135 Q 36 130 20 133"/>
    <path d="M 56 120 Q 38 112 22 114"/>
    <path d="M 60 105 Q 44 96 28 96"/>
    <path d="M 65 90 Q 50 80 36 78"/>
    <path d="M 70 75 Q 56 64 42 60"/>
  </g>

  <!-- The iconic peacock eye at the top of the curve -->
  <ellipse cx="80" cy="25" rx="22" ry="28" fill="#1a5d4a" opacity="0.65"
           transform="rotate(-15 80 25)"/>
  <ellipse cx="80" cy="23" rx="17" ry="22" fill="#0f6a8b" opacity="0.85"
           transform="rotate(-15 80 23)"/>
  <ellipse cx="80" cy="22" rx="12" ry="16" fill="#b06820" opacity="0.95"
           transform="rotate(-15 80 22)"/>
  <ellipse cx="80" cy="20" rx="7" ry="11" fill="#0a2a5e"
           transform="rotate(-15 80 20)"/>
  <ellipse cx="80" cy="18" rx="3" ry="5" fill="#1fb6c7" opacity="0.95"
           transform="rotate(-15 80 18)"/>
  <ellipse cx="80" cy="16" rx="1" ry="2" fill="#f3c969"
           transform="rotate(-15 80 16)"/>

  <!-- Tiny wispy tips above the eye -->
  <g stroke="#3a7a5f" stroke-width="0.7" opacity="0.5" stroke-linecap="round" fill="none">
    <path d="M 78 4 Q 76 -2 72 -4"/>
    <path d="M 82 3 Q 84 -3 86 -6"/>
    <path d="M 80 5 Q 80 -2 80 -6"/>
  </g>
</svg>
